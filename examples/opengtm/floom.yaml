name: OpenGTM
description: Open source AI GTM toolkit. AEO health scoring and ICP lead
  qualification, straight from the terminal. MIT licensed alternative to Clay,
  Apollo, and Semrush.
actions:
  aeo_health:
    label: AEO Health Check
    inputs:
      - name: url
        label: URL
        type: url
        required: true
        placeholder: https://floom.dev
        description: Page to analyze.
      - name: timeout
        label: Timeout (seconds)
        type: number
        required: false
        default: 30
        description: HTTP request timeout.
    outputs:
      - name: url
        label: URL
        type: text
      - name: score
        label: Score
        type: number
      - name: grade
        label: Grade
        type: text
      - name: band
        label: Band
        type: text
      - name: checks_passed
        label: Checks Passed
        type: number
      - name: checks_failed
        label: Checks Failed
        type: number
      - name: issues
        label: Issues
        type: json
      - name: tier_details
        label: Tier Details
        type: json
    description: Run 29 checks across technical SEO, structured data, AI crawler
      access, and authority signals. Returns a tiered score and letter grade (A+
      to F) so you know whether ChatGPT and Perplexity can actually find you.
  score_lead:
    label: Score Lead (ICP)
    inputs:
      - name: lead
        label: Lead (JSON)
        type: textarea
        required: true
        placeholder: '{"domain": "acme.com", "company": "Acme", "industry": "B2B SaaS"}'
        description: 'Lead object as JSON. Minimum: { "domain": "...", "company": "...",
          "industry": "..." }. Optionally include research_data from opengtm
          research.py.'
      - name: icp_profile
        label: ICP Profile
        type: text
        required: false
        default: default
        description: "Built-in profile key: default, saas, agency, enterprise, ..."
      - name: custom_profile
        label: Custom Profile (optional JSON)
        type: textarea
        required: false
        description: Full ICP profile object as JSON to override the preset. Leave empty
          to use the built-in profile.
    outputs:
      - name: score
        label: Score
        type: number
      - name: tier
        label: Tier
        type: text
      - name: recommended_action
        label: Recommended Action
        type: text
      - name: reasons
        label: Reasons
        type: json
      - name: breakdown
        label: Breakdown
        type: json
    description: Score a lead on ICP fit (0-100) across six dimensions (size,
      industry, digital maturity, pain signals, revenue, contact quality).
      Returns tier (hot/warm/cold) and a recommended next action.
runtime: python
python_dependencies:
  - httpx>=0.27.0
  - beautifulsoup4>=4.12.0
  - lxml>=5.0.0
  - requests>=2.31.0
  - python-dotenv>=1.0.0
node_dependencies: {}
secrets_needed: []
manifest_version: "2.0"
