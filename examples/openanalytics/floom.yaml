name: OpenAnalytics
description: AEO (Answer Engine Optimization) analysis platform. Runs health
  checks (29 technical SEO checks with tiered scoring) and AI visibility
  analysis (hyperniche query generation to measure brand presence in AI
  responses).
actions:
  health_check:
    label: AEO Health Check
    inputs:
      - name: url
        label: Website URL
        type: url
        required: true
        placeholder: https://example.com
    outputs:
      - name: report
        label: Health Report
        type: markdown
      - name: score
        label: Health Score (0-100)
        type: number
      - name: details
        label: Detailed Results
        type: json
  mentions_check:
    label: AI Visibility Check
    inputs:
      - name: company_name
        label: Company Name
        type: text
        required: true
      - name: industry
        label: Industry
        type: text
        required: false
      - name: products
        label: Products (one per line)
        type: textarea
        required: false
      - name: target_audience
        label: Target Audience
        type: text
        required: false
      - name: num_queries
        label: Number of Queries
        type: number
        required: false
        default: 10
    outputs:
      - name: report
        label: Visibility Report
        type: markdown
      - name: visibility_score
        label: Visibility Score
        type: number
      - name: details
        label: Detailed Results
        type: json
runtime: python
python_dependencies:
  - fastapi>=0.104.0
  - uvicorn>=0.24.0
  - pydantic>=2.5.0
  - httpx>=0.25.0
  - beautifulsoup4>=4.12.0
  - lxml>=4.9.0
  - google-genai>=0.2.0
  - python-dotenv>=1.0.0
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
knowledge_enabled: true
