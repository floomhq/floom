name: OpenPaper
description: Generate fully-cited academic research papers. 18 AI agents search
  500M+ sources (OpenAlex, Crossref, Semantic Scholar) and write thesis-level
  papers with verified citations.
actions:
  start_paper_generation:
    label: Start Paper
    inputs:
      - name: topic
        label: Topic
        type: textarea
        required: true
        description: Research topic or question (max 500 chars). Be specific for better
          results.
      - name: level
        label: Academic Level
        type: text
        required: false
        default: Graduate
        description: High School | Undergraduate | Graduate | PhD
      - name: pages
        label: Pages
        type: text
        required: false
        default: 15-20
        description: "Target page range: 5-10, 10-15, 15-20, 20-30, 30-40, 40-50, 50-60"
      - name: citation_style
        label: Citation Style
        type: text
        required: false
        default: APA 7th
        description: APA 7th | MLA 9th | Chicago 17th | Harvard | IEEE | Vancouver
      - name: language
        label: Language
        type: text
        required: false
        default: English
        description: Output language (English, Spanish, French, German, etc.)
      - name: context_notes
        label: Extra Context
        type: textarea
        required: false
        default: ""
        description: Optional extra instructions for the paper (max 50,000 chars).
    outputs:
      - name: generation_id
        label: Generation ID
        type: text
      - name: status
        label: Status
        type: text
      - name: track_url
        label: Track URL
        type: text
    description: Start generating a cited academic paper. Returns a generation_id
      immediately; papers take 10-20 minutes to finish.
  check_paper_status:
    label: Check Status
    inputs:
      - name: generation_id
        label: Generation ID
        type: text
        required: true
        description: The generation_id returned by Start Paper.
    outputs:
      - name: status
        label: Status
        type: text
      - name: phase
        label: Phase
        type: text
      - name: progress_percent
        label: Progress %
        type: number
      - name: pdf_url
        label: PDF URL
        type: text
      - name: docx_url
        label: DOCX URL
        type: text
      - name: zip_url
        label: ZIP URL
        type: text
    description: Poll a paper generation for progress and download links.
  list_my_papers:
    label: List Papers
    inputs:
      - name: limit
        label: Limit
        type: number
        required: false
        default: 10
        description: Max papers to return (1-50).
    outputs:
      - name: total
        label: Total
        type: number
      - name: papers
        label: Papers
        type: json
    description: List your previously generated papers with download links.
runtime: python
python_dependencies:
  - httpx
  - mcp
node_dependencies: {}
secrets_needed:
  - OPENPAPER_API_TOKEN
manifest_version: "2.0"
