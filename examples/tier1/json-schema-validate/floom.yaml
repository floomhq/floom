name: json-schema-validate
display_name: JSON Schema Validator
description: "Validate a JSON document against a JSON Schema and return structured errors."
creator: "@federicodeponte"
category: utilities
type: hosted
runtime: python3.12
build: pip install -r requirements.txt
run: uvicorn app:app --host 0.0.0.0 --port 8000
openapi_spec: /openapi.json
inputs_from: openapi
memory_mb: 256
timeout: 30s
