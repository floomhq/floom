name: OpenDraft
description: Generate research-grade drafts with structured outlines and
  citations. Powered by Gemini AI.
actions:
  generate:
    label: Generate Draft
    inputs:
      - name: topic
        label: Research Topic
        type: textarea
        required: true
        placeholder: The role of AI in accelerating drug discovery
      - name: level
        label: Academic Level
        type: text
        required: false
        default: research_paper
        placeholder: research_paper / bachelor / master / phd
      - name: style
        label: Citation Style
        type: text
        required: false
        default: apa
        placeholder: apa / ieee / chicago / mla
      - name: blurb
        label: Focus / Context (optional)
        type: text
        required: false
        placeholder: Focus on LLM-based protein folding approaches
    outputs:
      - name: preview
        label: Draft Preview
        type: html
      - name: markdown
        label: Markdown Source
        type: markdown
      - name: title
        label: Title
        type: text
      - name: word_count
        label: Word Count
        type: number
    description: Generate a research draft on any topic.
    feedback: true
runtime: python
python_dependencies:
  - google-generativeai>=0.8
node_dependencies: {}
secrets_needed:
  - GOOGLE_API_KEY
manifest_version: "2.0"
