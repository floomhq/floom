name: OpenBlog
description: AI-powered SEO blog article generator
actions:
  generate:
    label: Generate Articles
    inputs:
      - name: url
        label: Company Website URL
        type: url
        required: true
      - name: keywords
        label: Keywords (one per line)
        type: textarea
        required: true
    outputs:
      - name: preview
        label: Article Preview
        type: html
      - name: markdown
        label: Markdown Source
        type: markdown
      - name: raw
        label: Raw Response
        type: json
    description: Generate new blog articles from keywords and a company URL
    feedback: true
  refresh:
    label: Refresh Article
    inputs:
      - name: article_data
        label: Article (JSON, CSV, HTML, or paste text)
        type: file
        required: true
        accept: .json,.csv,.html,.txt
        parse_to: json
    outputs:
      - name: preview
        label: Article Preview
        type: html
      - name: markdown
        label: Markdown Source
        type: markdown
      - name: raw
        label: Raw Response
        type: json
    description: Re-run quality checks and URL verification on an existing article
runtime: python
python_dependencies:
  - google-genai>=1.0
  - httpx
  - pydantic>=2.0
  - python-dotenv
  - defusedxml>=0.7
  - markdownify
  - openpyxl
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
knowledge_enabled: true
