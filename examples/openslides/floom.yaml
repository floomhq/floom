name: OpenSlides
description: AI pitch deck generator. Point it at a prompt (and optionally a
  company URL) and get a branded pitch deck back as HTML slides plus a
  base64-encoded PDF.
actions:
  generate:
    label: Generate Deck
    inputs:
      - name: prompt
        label: Prompt
        type: textarea
        required: true
        placeholder: Floom is the production layer for AI scripts. Raising $200K F&F at
          $8M cap.
        description: What the deck is about. Include company, stage, ask, and audience.
      - name: company_url
        label: Company URL
        type: url
        required: false
        placeholder: https://floom.dev
        description: Optional company website. If set, brand colors, fonts, and logo are
          scraped from it.
      - name: audience
        label: Audience
        type: text
        required: false
        default: vc
        description: "Target audience: vc, angel, ff, or customer."
      - name: deck_type
        label: Deck Type
        type: text
        required: false
        default: pitch
        description: "Type of deck: pitch, sales, update, or general."
    outputs:
      - name: preview
        label: Slide Deck Preview
        type: html
      - name: slide_count
        label: Slide Count
        type: number
      - name: slides
        label: Raw Slide Data
        type: json
      - name: deck_id
        label: Deck ID
        type: text
      - name: pdf_base64
        label: PDF (base64)
        type: text
      - name: pdf_size_bytes
        label: PDF Size (bytes)
        type: number
    description: Generate a branded pitch deck from a prompt and optional company
      URL. Scrapes brand colors, fonts, and logo from the URL. Returns slide
      HTML and (when PDF export is available) a base64-encoded PDF.
  iterate:
    label: Iterate Slides
    inputs:
      - name: deck_id
        label: Previous Deck ID
        type: text
        required: true
        description: ID of the deck to iterate on.
      - name: prompt
        label: Refinement
        type: textarea
        required: true
        description: What to change or improve on the selected slides.
      - name: slide_indices
        label: Slide Indices (JSON array)
        type: textarea
        required: true
        placeholder: "[0, 2, 4]"
        description: 0-based indices of slides to regenerate as a JSON array, e.g. [2,
          4, 5].
    outputs:
      - name: deck_id
        label: Deck ID
        type: text
      - name: slide_count
        label: Slide Count
        type: number
      - name: pdf_base64
        label: PDF (base64)
        type: text
      - name: pdf_size_bytes
        label: PDF Size (bytes)
        type: number
    description: Regenerate specific slides of a previously generated deck while
      keeping the rest. Returns the updated deck.
  resolve_logo:
    label: Resolve Logo
    inputs:
      - name: name
        label: Company or Domain
        type: text
        required: true
        placeholder: stripe.com
    outputs:
      - name: url
        label: Logo URL
        type: text
      - name: format
        label: Format
        type: text
      - name: provider
        label: Provider
        type: text
    description: Find the best logo URL for a company name or domain. Uses Simple
      Icons, svgl, and favicon fallbacks.
runtime: python
python_dependencies:
  - google-genai==1.9.0
  - httpx==0.28.1
  - Pillow==11.1.0
  - PyPDF2==3.0.1
  - python-pptx==1.0.2
  - colorthief==0.2.1
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
