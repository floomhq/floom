name: OpenContext
description: AI-powered company context analysis. Extracts comprehensive company
  information (industry, products, competitors, target audience, voice persona,
  visual identity) from any website using Google Gemini with Search grounding.
actions:
  analyze:
    label: Analyze Company
    inputs:
      - name: url
        label: Company Website URL
        type: url
        required: true
        placeholder: https://example.com
      - name: additional_context
        label: Additional Context
        type: textarea
        required: false
        placeholder: Any extra info about the company (optional)
    outputs:
      - name: company_name
        label: Company Name
        type: text
      - name: summary
        label: Company Summary
        type: markdown
      - name: context_json
        label: Full Context Data
        type: json
runtime: python
python_dependencies:
  - pydantic>=2.0
  - python-dotenv>=1.0
  - httpx>=0.25
  - google-genai>=1.0
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
knowledge_enabled: true
