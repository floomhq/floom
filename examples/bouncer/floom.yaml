name: Bouncer
description: Gemini stands at the door. Independent quality gate that audits an
  AI agent's output and returns a 0-10 score, issues list, and PASS/FAIL
  verdict. Built to catch unverified claims before they ship.
actions:
  audit:
    label: Audit Output
    inputs:
      - name: assistant_text
        label: Assistant Output
        type: textarea
        required: true
        description: The full text the agent produced and wants audited.
      - name: diff_text
        label: Code Diff (optional)
        type: textarea
        required: false
        description: Optional git diff to ground coding-task audits against real changes.
      - name: task_context
        label: Task Context (optional)
        type: textarea
        required: false
        description: "Optional context: user request, project rules, workplan."
      - name: model
        label: Gemini Model
        type: text
        required: false
        default: gemini-3.1-pro-preview
        description: Gemini model to use for scoring.
    outputs:
      - name: score
        label: Score
        type: number
      - name: verdict
        label: Verdict
        type: text
      - name: passed
        label: Passed
        type: text
      - name: issues
        label: Issues
        type: json
      - name: raw
        label: Raw Response
        type: text
    description: Score an AI agent's final response with Gemini as an independent
      reviewer. Returns score/10, issues, and PASS/FAIL.
runtime: python
python_dependencies:
  - google-genai==1.64.0
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
