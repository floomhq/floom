# Blast Radius — proxied-mode (pure HTTP, no docker.sock required).
# Start the upstream first: node examples/blast-radius/server.mjs
# Then point Floom at this file via FLOOM_APPS_CONFIG.

apps:
  - slug: blast-radius
    type: proxied
    openapi_spec_url: http://localhost:4113/openapi.json
    display_name: Blast Radius
    description: "Find all files affected by your changes. Clone a public repo and diff a branch to get changed + impacted files."
    category: developer-tools
