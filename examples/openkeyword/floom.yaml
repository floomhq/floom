name: OpenKeyword
description: "AI-powered SEO keyword research using Google Gemini. Runs a
  5-stage pipeline: company analysis, deep research, AI keyword generation,
  scoring/deduplication, and clustering."
actions:
  research:
    label: Research Keywords
    inputs:
      - name: company_url
        label: Company Website URL
        type: url
        required: true
        placeholder: https://example.com
      - name: company_name
        label: Company Name
        type: text
        required: false
        placeholder: Auto-detected from URL if empty
      - name: target_count
        label: Target Keyword Count
        type: number
        required: false
        default: 50
      - name: language
        label: Language Code
        type: text
        required: false
        default: en
      - name: region
        label: Region Code
        type: text
        required: false
        default: us
    outputs:
      - name: summary
        label: Research Summary
        type: markdown
      - name: keywords
        label: Keywords
        type: table
      - name: clusters
        label: Keyword Clusters
        type: json
      - name: full_results
        label: Full Pipeline Results
        type: json
runtime: python
python_dependencies:
  - google-genai>=1.0.0
  - pydantic>=2.0.0
  - python-dotenv>=1.0.0
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
manifest_version: "2.0"
knowledge_enabled: true
